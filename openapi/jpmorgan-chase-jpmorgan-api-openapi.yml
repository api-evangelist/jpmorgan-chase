openapi: 3.1.0
info:
  title: JPMorgan Chase API
  description: >-
    JPMorgan Chase provides developer APIs for banking services including payments, treasury, trade finance, and market data. The APIs enable corporate clients and fintech partners to integrate banking capabilities into their applications.
  version: '1.0'
  contact:
    name: JPMorgan Chase Developer Support
    url: https://developer.jpmorgan.com/
externalDocs:
  description: Documentation
  url: https://developer.jpmorgan.com/
servers:
  - url: https://api.jpmorgan.com
    description: Production
tags:
  - name: Banking
    description: Banking operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Banking
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
