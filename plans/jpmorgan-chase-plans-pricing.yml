specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: JPMorgan Chase
providerId: jpmorgan-chase
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: JPMorgan Chase does not publish a public price list for its developer / payments
  APIs. Pricing is determined per banking relationship through the J.P. Morgan Payments
  and Embedded Banking sales motion. Reconciliation blocked pending publicly available
  rate sheet.
tags:
  - Banking
  - Embedded Finance
  - Finance
  - Financial Services
  - Payments
  - Treasury
description: Plans artifact for JPMorgan Chase developer / Payments / Embedded Finance APIs.
  Commercial terms are negotiated as part of a banking relationship rather than a self-serve
  plan tier.
sources:
  - https://www.jpmorgan.com/payments
  - https://developer.payments.jpmorgan.com/
plans:
  - id: jpmorgan-chase-banking-relationship
    name: Banking Relationship
    type: enterprise
    description: API access (Payments, Treasury Services, Embedded Banking, ACH, Wires,
      Real-Time Payments, FX) is unlocked as part of an underlying banking relationship.
      Per-transaction fees and any monthly minimums are set in the client agreement, not on
      a public price list.
    entries:
      - label: Payments / Treasury / Embedded Banking API Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact J.P. Morgan Payments
        userMultiplied: false
    elements:
      - name: Underlying banking relationship required
      - name: KYC / AML onboarding
      - name: Sandbox access via developer portal
      - name: Production scope unlocked per product (Payments, ACH, Wires, RTP, FX, Embedded Banking)
