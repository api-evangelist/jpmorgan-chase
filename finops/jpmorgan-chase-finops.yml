specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: JPMorgan Chase
providerId: jpmorgan-chase
publisherName: JPMorgan Chase Bank, N.A.
serviceCategory: Banking / Payments
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: JPMorgan Chase does not expose a public usage-billing API for its developer /
  Payments surface. FinOps shape inferred from a per-transaction banking model. Meters
  list common payment-class billable units; replace with the contract-specific invoice
  line items.
tags:
  - Banking
  - Embedded Finance
  - Financial Services
  - Payments
  - Treasury
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for JPMorgan Chase Payments / Treasury / Embedded
  Banking APIs. Treated as a per-transaction banking model with negotiated client pricing.
sources:
  - https://www.jpmorgan.com/payments
  - https://developer.payments.jpmorgan.com/
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Per-Transaction + Negotiated
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
    - Refund
focusColumns:
  ServiceName: JPMorgan Chase Payments APIs
  ServiceCategory: Banking / Payments
  ProviderName: JPMorgan Chase
  PublisherName: JPMorgan Chase Bank, N.A.
  InvoiceIssuerName: JPMorgan Chase Bank, N.A.
  BillingCurrency: USD
meters:
  - name: ach_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - account
      - direction
      - sec_code
  - name: wire_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - account
      - currency
      - direction
  - name: rtp_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - account
      - direction
  - name: card_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - account
      - card_brand
      - mcc
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - product
      - account
principles:
  - name: Visibility
    description: Reconcile usage against the monthly J.P. Morgan account analysis statement;
      developer portal also exposes per-call telemetry for some products.
  - name: Allocation
    description: Allocate by account number and product (ACH, Wires, RTP, Card, FX) to
      mirror account-analysis line items.
  - name: Optimization
    description: Right-size between rails (RTP vs ACH vs Wire) for cost-per-payment;
      reconcile FX margin against quoted rates.
  - name: Accountability
    description: Pair the J.P. Morgan implementation manager with an internal treasurer /
      payments product owner; review quarterly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
