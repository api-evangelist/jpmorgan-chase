aid: jpmorgan-chase
name: JPMorgan Chase
description: >-
  JPMorgan Chase is a leading global financial services firm and one of the
  largest banking institutions in the United States, with operations across
  investment banking, financial services, asset management, and private equity.
  Through its developer platform, JPMorgan Chase publishes APIs for banking
  services including payments, treasury services, trade finance, FX, embedded
  finance, and market data, enabling corporate clients and fintech partners to
  integrate banking capabilities into their applications.
